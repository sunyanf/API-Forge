services:
  db:
    image: mysql:8.0
    container_name: ai_forge_db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ai_forge
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - ai_forge_net
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7
    container_name: ai_forge_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_forge_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_forge_app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_LOG_FILE=/var/log/ai-forge/app.log
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=password
      - MYSQL_DATABASE=ai_forge
    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - ./logs:/var/log/ai-forge
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_forge_net

  swagger:
    image: swaggerapi/swagger-ui:v4.15.5
    container_name: ai_forge_swagger
    ports:
      - "8081:8080"
    environment:
      - SWAGGER_JSON=/openapi.yaml
    volumes:
      - ./openapi.yaml:/openapi.yaml:ro
    restart: unless-stopped
    networks:
      - ai_forge_net

networks:
  ai_forge_net:
    driver: bridge

volumes:
  db_data:
    driver: local
